<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Agenda SC</title>
<style>
  :root{--bg:#0f0f13;--surface:#1a1a24;--surface2:#22222f;--green:#27ae60;--text:#e8e8f0;--text2:#9090a8;--border:rgba(255,255,255,0.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px 32px;width:100%;max-width:400px}
  .logo{text-align:center;margin-bottom:8px;font-size:22px;font-weight:900;background:linear-gradient(135deg,#27ae60,#2ecc71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .subtitle{text-align:center;color:var(--text2);font-size:13px;margin-bottom:28px}
  .error{background:rgba(233,69,96,.12);border:1px solid rgba(233,69,96,.3);border-radius:10px;padding:12px 16px;color:#ff8099;font-size:13px;margin-bottom:20px}
  .form-group{margin-bottom:16px}
  label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
  input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 14px;font-size:14px;outline:none;transition:.2s;font-family:inherit}
  input:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(39,174,96,.15)}
  .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#27ae60,#2ecc71);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:.2s}
  .btn-submit:hover{opacity:.9}
  .footer-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text2)}
  .footer-link a{color:var(--green)}
</style>
</head>
<body>

<div class="box">
  <div class="logo">📅 Agenda SC</div>
  <div class="subtitle">Acesse o painel do seu negócio</div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/agenda/entrar">
    <div class="form-group">
      <label>WhatsApp cadastrado</label>
      <input type="tel" name="phone" placeholder="(47) 99999-9999" required>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" name="password" placeholder="Sua senha" required>
    </div>
    <button type="submit" class="btn-submit">📅 Entrar no painel</button>
  </form>

  <div class="footer-link">
    Ainda não tem conta? <a href="/agenda/cadastro">Criar grátis</a>
    &nbsp;·&nbsp; <a href="/agenda">Voltar</a>
  </div>
</div>

</body>
</html>
