<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio SC — Admin Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo .icon {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
  }
  .logo h1 {
    color: #fff;
    font-size: 24px;
    font-weight: 700;
  }
  .logo p {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    margin-top: 4px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus {
    border-color: #e94560;
  }
  input[type="password"]::placeholder {
    color: rgba(255,255,255,0.3);
  }
  .error {
    background: rgba(233,69,96,0.2);
    border: 1px solid rgba(233,69,96,0.4);
    color: #ff6b6b;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 20px;
    text-align: center;
  }
  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #e94560, #c0392b);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .back-link {
    text-align: center;
    margin-top: 20px;
  }
  .back-link a {
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    font-size: 13px;
  }
  .back-link a:hover { color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="icon">📻</span>
    <h1>Rádio SC</h1>
    <p>Painel Administrativo</p>
  </div>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Senha de acesso</label>
      <input type="password" name="password" placeholder="Digite a senha..." autofocus required>
    </div>
    <button type="submit" class="btn">🔐 Entrar no Painel</button>
  </form>
  <div class="back-link">
    <a href="/">← Voltar ao site</a>
  </div>
</div>
</body>
</html>
